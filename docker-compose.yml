version: '3.8'

services:
  # N8N Workflow Orchestration
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: creatoros-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-changeme}
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Asia/Kolkata
    volumes:
      - ./n8n/data:/home/node/.n8n
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - creatoros-network
    depends_on:
      - rag-service

  # ChromaDB Vector Database
  chromadb:
    image: chromadb/chroma:latest
    container_name: creatoros-chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - ./chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - creatoros-network

  # Ollama Local LLM
  ollama:
    image: ollama/ollama:latest
    container_name: creatoros-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./ollama-models:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 8G
    networks:
      - creatoros-network

  # RAG Service (FastAPI)
  rag-service:
    build:
      context: ./rag-service
      dockerfile: Dockerfile
    container_name: creatoros-rag
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=11434
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
    volumes:
      - ./rag-service/data:/app/data
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - creatoros-network
    depends_on:
      - chromadb
      - ollama

networks:
  creatoros-network:
    driver: bridge
